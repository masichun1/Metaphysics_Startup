<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login — Mystic Sanctuary</title><style>
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1a0a2e,#2d1b4e);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.login-box{background:rgba(255,255,255,0.05);padding:48px;border-radius:16px;border:1px solid rgba(201,169,110,0.3);width:100%;max-width:400px}
h1{font-family:'Cormorant Garamond',serif;text-align:center;color:#c9a96e;margin-bottom:24px}
input{width:100%;padding:14px;border:1px solid rgba(201,169,110,0.3);border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;font-size:16px;margin-bottom:12px}
button{width:100%;padding:14px;background:#c9a96e;color:#1a0a2e;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.error{color:#e74c3c;text-align:center;margin-bottom:12px}
</style></head><body><div class="login-box"><h1>Mystic Sanctuary Admin</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="POST">
<input type="password" name="password" placeholder="Enter admin password" required autofocus>
<button type="submit">Login</button>
</form></div></body></html>
