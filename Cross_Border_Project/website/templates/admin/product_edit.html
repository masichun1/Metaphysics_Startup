<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{% if product %}Edit{% else %}New{% endif %} Product — Admin</title><style>
body{font-family:'Inter',sans-serif;background:#faf9f6;color:#3d3d3d;margin:0}
.main{max-width:800px;margin:0 auto;padding:32px}
h1{font-family:'Cormorant Garamond',serif}
.form-group{margin-bottom:16px}
label{display:block;font-weight:600;font-size:14px;margin-bottom:4px;color:#1a0a2e}
input,textarea,select{width:100%;padding:10px;border:1px solid #e0d5c1;border-radius:6px;font-family:inherit;font-size:14px}
textarea{min-height:200px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{padding:12px 28px;background:#1a0a2e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.btn-secondary{padding:12px 28px;background:transparent;color:#1a0a2e;border:1px solid #1a0a2e;border-radius:6px;text-decoration:none;font-size:15px}
</style></head><body>
<div class="main"><h1>{% if product %}Edit Product: {{ product.sku }}{% else %}New Product{% endif %}</h1>
<form method="POST" style="margin-top:24px">
<div class="row"><div class="form-group"><label>SKU *</label><input name="sku" value="{{ product.sku if product else '' }}" required></div>
<div class="form-group"><label>Category</label><input name="category" value="{{ product.category if product else '' }}"></div></div>
<div class="form-group"><label>Title *</label><input name="title" value="{{ product.title if product else '' }}" required></div>
<div class="row"><div class="form-group"><label>Price ($)</label><input name="price" type="number" step="0.01" value="{{ product.price if product else '' }}" required></div>
<div class="form-group"><label>Compare-at Price ($)</label><input name="compare_at_price" type="number" step="0.01" value="{{ product.compare_at_price if product and product.compare_at_price else '' }}"></div></div>
<div class="row"><div class="form-group"><label>Inventory</label><input name="inventory" type="number" value="{{ product.inventory if product else 100 }}"></div>
<div class="form-group"><label>Tags (comma-separated)</label><input name="tags" value="{{ product.tags|join(', ') if product else '' }}"></div></div>
<div class="form-group"><label>Meta Description</label><input name="meta_description" value="{{ product.meta_description if product else '' }}"></div>
<div class="form-group"><label>SEO Keywords</label><input name="seo_keywords" value="{{ product.seo_keywords if product else '' }}"></div>
<div class="form-group"><label>Product Description (HTML)</label><textarea name="body_html">{{ product.body_html if product else '' }}</textarea></div>
<div style="display:flex;gap:12px;margin-top:24px"><button type="submit" class="btn">Save Product</button><a href="/admin/products" class="btn-secondary">Cancel</a></div>
</form></div></body></html>
