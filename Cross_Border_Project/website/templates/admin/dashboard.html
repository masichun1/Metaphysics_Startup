<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Dashboard — Mystic Sanctuary</title><style>
body{font-family:'Inter',sans-serif;background:#faf9f6;color:#3d3d3d;margin:0}
.sidebar{background:#1a0a2e;color:#fff;width:220px;position:fixed;top:0;left:0;bottom:0;padding:24px}
.sidebar h2{font-family:'Cormorant Garamond',serif;color:#c9a96e;margin-bottom:24px}
.sidebar a{display:block;color:#b396c4;padding:10px 0;text-decoration:none;font-size:14px;border-bottom:1px solid rgba(201,169,110,0.1)}
.sidebar a:hover{color:#fff}.sidebar a.active{color:#c9a96e;font-weight:600}
.main{margin-left:220px;padding:32px}
h1{font-family:'Cormorant Garamond',serif;color:#1a0a2e}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}
.stat{background:#fff;padding:24px;border-radius:12px;border:1px solid #e0d5c1;text-align:center}
.stat-num{font-size:2.4rem;font-weight:700;color:#1a0a2e}
.stat-label{font-size:13px;color:#6b6b6b;margin-top:4px}
.green{color:#27ae60}.red{color:#c0392b}
.btn{display:inline-block;padding:10px 20px;background:#1a0a2e;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;margin-top:8px}
.logout{position:absolute;bottom:20px;color:#e74c3c}
</style></head><body>
<div class="sidebar"><h2>Admin Panel</h2>
<a href="/admin" class="active">Dashboard</a>
<a href="/admin/products">Products</a>
<a href="/admin/orders">Orders</a>
<a href="/admin/blog">Blog</a>
<a href="/" target="_blank">View Site &rarr;</a>
<a href="/admin/logout" class="logout">Logout</a>
</div>
<div class="main"><h1>Dashboard</h1>
<div class="stats">
<div class="stat"><div class="stat-num">{{ product_count }}</div><div class="stat-label">Products</div><a href="/admin/products" class="btn" style="margin-top:12px">Manage</a></div>
<div class="stat"><div class="stat-num">{{ post_count }}</div><div class="stat-label">Blog Posts</div><a href="/admin/blog" class="btn" style="margin-top:12px">Manage</a></div>
<div class="stat"><div class="stat-num">{{ pending_orders }}</div><div class="stat-label red">Pending Orders</div><a href="/admin/orders" class="btn" style="margin-top:12px">View</a></div>
<div class="stat"><div class="stat-num">${{ "%.2f"|format(revenue) }}</div><div class="stat-label green">Total Revenue</div></div>
</div></div></body></html>
